# モデル構成
model:
  n_layer: 6
  n_head: 8
  n_embd: 384
  block_size: 256
  dropout: 0.1
  bias: true

  # 追加：モデル名（自作モデル or 公開モデル）
  model_name: "scratch" # "scratch" | "rinna/japanese-gpt2-xsmall"

# 学習設定
train:
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  
  max_iters: 10000
  warmup_iters: 200 # 最初の200ステップで学習率をゆっくり上げる
  lr_decay_iters: 10000 # max_itersと同じに設定
  min_lr: 0.00001 # learning_rate / 10 程度
  
  eval_interval: 500
  eval_iters: 50
  save_interval: 1000

# パス設定
paths:
  data_dir: "data/text"
  tokenizer_model: "data/tokenizer/news_spm.model"
  checkpoint_dir: "outputs/checkpoints"
